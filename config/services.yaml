parameters:
    limits.apus_per_tenant: null
    limits.items_per_tenant: null
    app.link_display_mode: "both" # options: 'mobile', 'desktop', 'both'

services:
    # Default configuration for services in *this* file
    _defaults:
        autowire: true # Automatically injects dependencies
        autoconfigure: true # Automatically registers services as commands, event subscribers, etc.

    # Makes classes in src/ available to be used as services
    App\:
        resource: "../src/"
        exclude:
            - "../src/DependencyInjection/"
            - "../src/Entity/"
            - "../src/Kernel.php"

    # Controllers
    App\Controller\:
        resource: "../src/Controller/"
        tags: [ "controller.service_arguments" ]

    # Bind JWT secret for Revit API controller constructor
    App\Controller\API\RevitAPIController:
        arguments:
            $jwtSecret: "%env(JWT_SECRET_KEY)%"

    # Revit File Processor Service
    App\Service\RevitFileProcessor:
        arguments:
            $projectDir: "%kernel.project_dir%"

    # Security Services
    App\Security\UserProvider:
        arguments:
            $em: "@doctrine.orm.entity_manager"

    App\Security\AuthenticationSuccessHandler:
        arguments:
            $router: "@router"

    App\Service\SessionAnomalyDetector:
        arguments:
            $em: "@doctrine.orm.entity_manager"

    # 2FA Services
    App\Service\TwoFactorAuthService:
        arguments:
            $em: "@doctrine.orm.entity_manager"
            $google2fa: "@PragmaRX\\Google2FA\\Google2FA"

    PragmaRX\Google2FA\Google2FA: ~

    # Monolog Processors
    App\Service\TimezoneProcessor:
        tags:
            - { name: monolog.processor }

    # WebAuthnService: signature verification using OpenSSL
    App\Service\WebAuthnService: ~

    App\Service\RateLimitingService:
        arguments:
            $em: "@doctrine.orm.entity_manager"

    # Security Logger
    App\Service\SecurityLogger:
        arguments:
            $em: "@doctrine.orm.entity_manager"

    # Encryption Service (OWASP A02:2026)
    App\Service\EncryptionService:
        arguments:
            $appSecret: "%env(APP_SECRET)%"

    # Recovery Code Hasher (OWASP A02:2026)
    App\Service\RecoveryCodeHasher: ~

    # Brevo Mailer Transport Factory (API HTTPS - funciona en InfinityFree donde SMTP está bloqueado)
    Symfony\Component\Mailer\Bridge\Brevo\Transport\BrevoTransportFactory:
        tags:
            - { name: mailer.transport_factory }

    # PDO Session Handler: almacena sesiones en la base de datos MySQL
    # Reutiliza la conexión PDO nativa de Doctrine (evita abrir una segunda conexión)
    session.pdo_connection:
        class: PDO
        factory: ['@doctrine.dbal.default_connection', 'getNativeConnection']

    Symfony\Component\HttpFoundation\Session\Storage\Handler\PdoSessionHandler:
        arguments:
            - '@session.pdo_connection'
            - { db_table: sessions, lock_mode: 0 }

    # Error Notification Listener (envía email a superadmins en errores 500)
    App\EventListener\ErrorNotificationListener:
        arguments:
            $appEnv: "%kernel.environment%"
            $projectDir: "%kernel.project_dir%"
        tags:
            - { name: kernel.event_subscriber }

    # Event Listeners
    App\EventListener\RateLimitSubscriber:
        arguments:
            $anonymousApiLimiter: "@limiter.anonymous_api"
        tags:
            - { name: kernel.event_subscriber }
    App\EventListener\LocaleSubscriber:
        arguments:
            $defaultLocale: "%kernel.default_locale%"
        tags:
            - { name: kernel.event_subscriber }
    # Re-authentication listener: configure routes requiring re-auth and timeout (seconds)
    App\EventListener\ReauthListener:
        arguments:
            $routes:
                [
                    "app_admin_users_create",
                    "app_admin_users_edit",
                    "app_admin_users_toggle",
                    "app_admin_tenant",
                    "app_item_delete",
                ]
            $timeout: 300
        tags:
            - { name: kernel.event_subscriber }
    # Doctrine token provider for remember_me
    App\Security\DoctrineTokenProvider:
        arguments:
            $userProvider: "@App\\Security\\UserProvider"

    # Session controller uses detector (ensure detector is registered)
    App\Controller\Admin\SessionController: ~
