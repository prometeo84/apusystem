security:
    # Password hashers
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"

    # Providers
    providers:
        app_user_provider:
            id: App\Security\UserProvider

    # Firewalls
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                success_handler: App\Security\AuthenticationSuccessHandler
                default_target_path: app_dashboard
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: "%kernel.secret%"
                lifetime: 604800 # 1 week
                path: /
                always_remember_me: false

    # Access control
    access_control:
        - { path: ^/favicon.ico$, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/2fa-setup, roles: IS_AUTHENTICATED_REMEMBERED }
        # Allow public access to uploaded avatars so they can be served by Symfony
        - { path: ^/uploads/avatars, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        # Permitir remember_me para evitar loop de redirección
        - { path: ^/, roles: IS_AUTHENTICATED_REMEMBERED }

    # Role hierarchy
    role_hierarchy:
        ROLE_MANAGER: ROLE_USER
        ROLE_ADMIN: ROLE_MANAGER
        ROLE_SUPER_ADMIN: ROLE_ADMIN

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
