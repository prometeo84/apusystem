framework:
    secret: "%env(APP_SECRET)%"
    #csrf_protection: true
    http_method_override: false
    handle_all_throwables: true

    # Suppress deprecation warnings from vendor code (Symfony 7.x -> 8.0)
    php_errors:
        log: true

    # PHP session config
    session:
        handler_id: null
        cookie_secure: auto
        cookie_httponly: true
        cookie_samesite: lax
        cookie_lifetime: 0 # expire al cerrar el browser; la app controla la inactividad
        gc_maxlifetime: 10800 # 3 horas: máximo PHP session lifetime
        name: APPSESSID
        storage_factory_id: session.storage.factory.native

    # Rate Limiter
    rate_limiter:
        login:
            policy: "sliding_window"
            limit: 5
            interval: "15 minutes"
        api:
            policy: "fixed_window"
            limit: 100
            interval: "1 hour"
        admin_actions:
            policy: "fixed_window"
            limit: 10
            interval: "1 hour"

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
