name: Update Artifacts Badge

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
    workflow_run:
        workflows: ['Validators Suite']
        types: [completed]

permissions:
    contents: write
    actions: read

jobs:
    update-badge:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Get artifacts count for the run
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  run_id=$(python3 -c "import json,os; d=json.load(open(os.environ['GITHUB_EVENT_PATH'])); print(d['workflow_run']['id'])")
                  resp=$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/runs/${run_id}/artifacts")
                  total=$(echo "$resp" | python3 -c "import sys,json; print(json.load(sys.stdin).get('total_count',0))")
                  echo "ARTIFACTS_COUNT=$total" >> "$GITHUB_ENV"

            - name: Render SVG badge
              run: python3 scripts/generate_badge.py "${ARTIFACTS_COUNT:-0}"

            - name: Commit badge
              env:
                  GITHUB_ACTOR: github-actions
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add assets/badges/artifacts.svg || true
                  git commit -m "ci: update artifacts badge (artifacts count)" || echo "No changes to commit"
                  git push origin HEAD:main || true
