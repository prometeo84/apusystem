name: Update Artifacts Badge

on:
  workflow_run:
    workflows: ["Validators Suite"]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get artifacts count for triggered run
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          run_id=$(python3 -c "import json,os; d=json.load(open(os.environ['GITHUB_EVENT_PATH'])); print(d['workflow_run']['id'])")
          resp=$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/runs/${run_id}/artifacts"\)
          total=$(echo "$resp" | python3 -c "import sys,json; print(json.load(sys.stdin).get('total_count',0))")
          echo "ARTIFACTS_COUNT=$total" >> "$GITHUB_ENV"

      - name: Render SVG badge
        run: python3 scripts/generate_badge.py "${ARTIFACTS_COUNT:-0}"

      - name: Commit badge or upload as artifact
        env:
          BOT_PUSH_TOKEN: "${{ secrets.BOT_PUSH_TOKEN }}"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/badges/artifacts.svg || true
          if git diff --cached --quiet; then
            echo "No badge changes to commit."
            exit 0
          fi
          git commit -m "ci: update artifacts badge [skip ci]"
          if [ -n "$BOT_PUSH_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${BOT_PUSH_TOKEN}@github.com/${{ github.repository }}.git"
            git push origin HEAD:main
          else
            echo "BOT_PUSH_TOKEN not set; badge uploaded as artifact only."
          fi

      - name: Upload badge artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-badge
          path: assets/badges/artifacts.svg
