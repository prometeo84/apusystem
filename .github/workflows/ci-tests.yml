name: CI - Tests

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

concurrency:
    group: ci-tests-${{ github.ref }}
    cancel-in-progress: true

jobs:
    phpunit:
        name: PHP Unit Tests
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  extensions: mbstring, intl, pdo_mysql

            - name: Cache Composer
              uses: actions/cache@v4
              with:
                  path: ~/.composer/cache
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-composer-

            - name: Create .env for CI
              run: |
                  # Symfony Dotenv requires .env to exist; create it from .env.test for CI
                  if [ -f .env.test ]; then
                    cp .env.test .env
                  elif [ -f .env.dist ]; then
                    cp .env.dist .env
                    echo "APP_ENV=test" >> .env
                    echo "APP_SECRET=ci_placeholder_secret_not_real" >> .env
                  else
                    echo "APP_ENV=test" > .env
                    echo "APP_SECRET=ci_placeholder_secret_not_real" >> .env
                    echo "DATABASE_URL=sqlite:///%kernel.cache_dir%/test.db" >> .env
                  fi

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist --no-progress

            - name: Run phpunit
              run: |
                  if [ -x vendor/bin/phpunit ]; then
                    vendor/bin/phpunit --configuration phpunit.dist.xml --colors=always || true
                  else
                    echo "No phpunit binary found; skipping tests";
                  fi
