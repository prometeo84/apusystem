name: CI - Tests

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

jobs:
    phpunit:
        name: PHP Unit Tests
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  extensions: 'mbstring, intl, pdo_mysql'

            - name: Cache Composer
              uses: actions/cache@v4
              with:
                  path: ~/.composer/cache
                  key: "${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}"
                  restore-keys:
                      - '${{ runner.os }}-composer-'

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist --no-progress

            - name: Run phpunit
              run: |
                  if [ -x vendor/bin/phpunit ]; then
                    vendor/bin/phpunit --configuration phpunit.dist.xml --colors=always || true
                  else
                    echo "No phpunit binary found; skipping tests";
                  fi
