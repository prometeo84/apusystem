name: Validators Suite
# Updated: merged css-validation and added caching/concurrency

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 18 * * *' # diaria a las 18:00 UTC (job de performance)

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: validators-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-validate:
    name: ESLint + Stylelint + PHPStan + W3C
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (for vnu.jar)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-

      - name: Cache vnu.jar
        id: cache-vnu
        uses: actions/cache@v4
        with:
          path: .tools/vnu.jar
          key: vnu-jar-20.6.30-v1

      - name: Download vnu.jar (if not cached)
        if: steps.cache-vnu.outputs.cache-hit != 'true'
        run: |
          mkdir -p .tools
          echo "Descargando vnu.jar 20.6.30..."
          curl -fSL --retry 3 --retry-delay 5 \
            -o .tools/vnu.jar.zip \
            "https://github.com/validator/validator/releases/download/20.6.30/vnu.jar_20.6.30.zip"
          unzip -o .tools/vnu.jar.zip dist/vnu.jar -d .tools/
          mv .tools/dist/vnu.jar .tools/vnu.jar
          rm -rf .tools/vnu.jar.zip .tools/dist
          echo "Descarga completa: $(du -sh .tools/vnu.jar | cut -f1)"

      - name: Install npm dependencies
        run: npm ci

      - name: Verify CSS files exist
        run: |
          echo "=== Archivos CSS generados ==="
          ls -lh public/build/*.css 2>/dev/null || { echo "ERROR: No hay archivos CSS en public/build/"; exit 1; }

      - name: Run ESLint (JSON)
        run: |
          mkdir -p .tools
          # create a minimal ESLint config for CI if none exists
          if [ ! -f .eslintrc.cjs ] && [ ! -f .eslintrc.json ] && [ ! -f .eslintrc ]; then
            echo "module.exports = { env: { browser: true, es2021: true }, rules: {} };" > .eslintrc.cjs
          fi
          npx eslint assets/app.js -f json -o .tools/eslint.json || true

      - name: Run Stylelint (JSON)
        run: |
          mkdir -p .tools
          # minimal stylelint config if not present
          if [ ! -f .stylelintrc.json ] && [ ! -f .stylelintrc.yaml ]; then
            echo '{"rules":{}}' > .stylelintrc.json
          fi
          npx stylelint 'assets/**/*.css' --formatter json > .tools/stylelint.json || true

      - name: Setup PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql

      - name: Install Composer deps
        run: |
          mkdir -p .tools
          # retry composer install a few times to avoid transient network hiccups
          for i in 1 2 3; do
            composer install --no-interaction --prefer-dist --no-suggest --no-progress && break || sleep 5
          done || echo "composer_install_failed" > .tools/composer_failed.txt

      - name: Run PHPStan (JSON)
        run: |
          mkdir -p .tools
          if [ -x vendor/bin/phpstan ]; then
            vendor/bin/phpstan analyse -c phpstan.neon --error-format=json > .tools/phpstan.json || true
          else
            echo "phpstan_missing" > .tools/phpstan_skipped.txt
          fi

      - name: Build assets
        run: |
          npm run build

      - name: Run W3C validator (vnu.jar)
        run: |
          mkdir -p .tools
          bash scripts/validate-css.sh || true

      - name: Collect reports
        run: ls -lah .tools || true

      - name: Upload validators report
        uses: actions/upload-artifact@v4
        with:
          name: validators-report
          path: .tools/

  accessibility-performance:
    name: Accessibility & Performance (pa11y + Lighthouse)
    runs-on: ubuntu-latest
    needs: lint-and-validate
    if: ${{ github.event_name == 'schedule' }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Start local server (background)
        run: |
          npm run preview &
          sleep 2

      - name: Run Pa11y
        run: |
          mkdir -p .tools
          npx pa11y http://127.0.0.1:5000 --reporter json > .tools/pa11y.json || true

      - name: Run Lighthouse (Headless)
        uses: browser-actions/setup-chrome@v1

      - name: Lighthouse report
        run: |
          mkdir -p .tools
          npx -y lighthouse http://127.0.0.1:5000 --output=json --output-path=.tools/lh-report.json --chrome-flags="--headless" || true

      - name: Upload validators report (accessibility)
        uses: actions/upload-artifact@v4
        with:
          name: validators-accessibility
          path: .tools/
