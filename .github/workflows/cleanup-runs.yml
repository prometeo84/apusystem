name: Cleanup Old Workflow Runs

on:
    schedule:
        - cron: '0 3 * * 0' # Cada domingo a las 03:00 UTC
    workflow_dispatch:      # Permite ejecución manual desde la UI de GitHub

permissions:
    actions: write

concurrency:
    group: cleanup-runs
    cancel-in-progress: true

jobs:
    cleanup:
        name: Delete runs older than 30 days
        runs-on: ubuntu-latest
        steps:
            - name: Delete completed runs older than 30 days
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  CUTOFF=$(python3 -c "import datetime; print((datetime.datetime.utcnow() - datetime.timedelta(days=30)).strftime('%Y-%m-%dT%H:%M:%SZ'))")
                  echo "Deleting runs created before: $CUTOFF"

                  DELETED=0
                  PAGE=1
                  while true; do
                      IDS=$(gh api "repos/${{ github.repository }}/actions/runs?per_page=100&page=$PAGE" \
                          --jq ".workflow_runs[] | select(.status == \"completed\") | select(.created_at < \"$CUTOFF\") | .id" 2>/dev/null || true)

                      [ -z "$IDS" ] && break

                      while IFS= read -r run_id; do
                          echo "  Deleting run $run_id"
                          gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$run_id" --silent 2>/dev/null || true
                          DELETED=$((DELETED + 1))
                      done <<< "$IDS"

                      PAGE=$((PAGE + 1))
                  done

                  echo "Done. Deleted $DELETED runs."
