name: Cleanup Old Workflow Runs

on:
    schedule:
        - cron: '0 3 * * 0' # Cada domingo a las 03:00 UTC
    workflow_dispatch: # Permite ejecución manual desde la UI de GitHub

permissions:
    actions: write

concurrency:
    group: cleanup-runs
    cancel-in-progress: true

jobs:
    cleanup:
        name: Keep only latest run per workflow
        runs-on: ubuntu-latest
        steps:
            - name: Delete all runs except the most recent per workflow
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  KEEP=1
                  DELETED=0
                  REPO="${{ github.repository }}"

                  # Obtener lista de workflows activos
                  WF_IDS=$(gh api "repos/$REPO/actions/workflows" --jq '.workflows[].id')

                  for WF_ID in $WF_IDS; do
                      WF_NAME=$(gh api "repos/$REPO/actions/workflows/$WF_ID" --jq '.name')
                      echo "Workflow: $WF_NAME ($WF_ID)"

                      # Recopilar todos los run IDs ordenados por fecha desc
                      ALL_RUNS=$(gh api "repos/$REPO/actions/workflows/$WF_ID/runs?per_page=100" \
                          --jq '[.workflow_runs | sort_by(.created_at) | reverse | .[].id]')

                      # Conservar los primeros KEEP, borrar el resto
                      TO_DELETE=$(echo "$ALL_RUNS" | python3 -c "
                  import json,sys
                  ids = json.load(sys.stdin)
                  for i in ids[$KEEP:]:
                      print(i)
                  ")

                      while IFS= read -r run_id; do
                          [ -z "$run_id" ] && continue
                          echo "  DELETE run $run_id"
                          gh api -X DELETE "repos/$REPO/actions/runs/$run_id" --silent 2>/dev/null || true
                          DELETED=$((DELETED + 1))
                      done <<< "$TO_DELETE"
                  done

                  echo "Done. Total eliminados: $DELETED"
