name: CSS Validation

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    validate-css:
        name: Validate CSS with vnu.jar
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Setup Java (for vnu.jar)
              uses: actions/setup-java@v4
              with:
                  distribution: 'temurin'
                  java-version: '11'

            - name: Cache node_modules
              uses: actions/cache@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node20-

            - name: Cache vnu.jar
              id: cache-vnu
              uses: actions/cache@v4
              with:
                  path: .tools/vnu.jar
                  key: vnu-jar-20.6.30-v1

            - name: Download vnu.jar (if not cached)
              if: steps.cache-vnu.outputs.cache-hit != 'true'
              run: |
                  mkdir -p .tools
                  echo "Descargando vnu.jar 20.6.30..."
                  curl -fSL --retry 3 --retry-delay 5 \
                    -o .tools/vnu.jar.zip \
                    "https://github.com/validator/validator/releases/download/20.6.30/vnu.jar_20.6.30.zip"
                  unzip -o .tools/vnu.jar.zip dist/vnu.jar -d .tools/
                  mv .tools/dist/vnu.jar .tools/vnu.jar
                  rm -rf .tools/vnu.jar.zip .tools/dist
                  echo "Descarga completa: $(du -sh .tools/vnu.jar | cut -f1)"

            - name: Install dependencies
              run: npm ci

            - name: Build assets
              run: npm run build

            - name: Verify CSS files exist
              run: |
                  echo "=== Archivos CSS generados ==="
                  ls -lh public/build/*.css 2>/dev/null || { echo "ERROR: No hay archivos CSS en public/build/"; exit 1; }

            - name: Run CSS validation (vnu.jar)
              run: |
                  mkdir -p .tools
                  # Aseguramos que existe un JSON vacío antes por si el script falla
                  echo '{"messages":[]}' > .tools/vnu-result.json
                  bash scripts/validate-css.sh

            - name: Upload vnu result artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: vnu-result
                  path: .tools/vnu-result.json
                  if-no-files-found: warn
