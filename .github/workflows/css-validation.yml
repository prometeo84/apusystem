name: CSS Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-css:
    name: Validate CSS with vnu.jar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java (for vnu.jar)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "11"

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Run CSS validation (vnu.jar)
        run: sh scripts/validate-css.sh

      - name: Upload vnu result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vnu-result
          path: .tools/vnu-result.json
