name: Snyk Security Scan

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: snyk-${{ github.ref }}
    cancel-in-progress: true

jobs:
    snyk-scan:
        name: Snyk scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '18'

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'

            - name: Setup Snyk
              run: |
                  if [ -z "$SNYK_TOKEN" ]; then
                    echo "SNYK_TOKEN missing; skipping Snyk setup"
                    exit 0
                  fi
                  npm install -g snyk || true

            - name: Snyk test (npm)
              run: |
                  if [ -z "$SNYK_TOKEN" ]; then
                    echo "SNYK_TOKEN missing; skipping Snyk npm test"
                    exit 0
                  fi
                  if [ -f package.json ]; then
                    npm ci
                    snyk test --all-projects || true
                  fi

            - name: Snyk test (composer)
              run: |
                  if [ -z "$SNYK_TOKEN" ]; then
                    echo "SNYK_TOKEN missing; skipping Snyk composer test"
                    exit 0
                  fi
                  if [ -f composer.json ]; then
                    composer install --no-interaction --prefer-dist --no-progress
                    snyk test --all-projects || true
                  fi
